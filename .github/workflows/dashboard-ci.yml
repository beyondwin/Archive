name: dashboard-ci

on:
  push:
    paths:
      - "AgentLens/**"
      - ".github/workflows/dashboard-ci.yml"
  pull_request:
    paths:
      - "AgentLens/**"
      - ".github/workflows/dashboard-ci.yml"

jobs:
  python:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        working-directory: AgentLens
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
      - name: Pytest
        working-directory: AgentLens
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: AgentLens/web/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        working-directory: AgentLens/web
        run: npm ci
      - name: Type-sync drift guard
        working-directory: AgentLens/web
        run: |
          npm run gen-types
          git diff --exit-code -- src/types/api.ts
          test -z "$(git status --porcelain -- src/types/api.ts)"
      - name: Vitest
        working-directory: AgentLens/web
        run: npx vitest run
      - name: Build
        working-directory: AgentLens/web
        run: npm run build
      - name: Playwright
        working-directory: AgentLens/web
        env:
          AGENTLENS_PYTHON: python
        run: |
          npx playwright install --with-deps chromium
          python -m pip install -e ../
          npx playwright test

  wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: AgentLens/web/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install frontend dependencies
        working-directory: AgentLens/web
        run: npm ci
      - name: Build wheel
        working-directory: AgentLens
        run: |
          python -m pip install --upgrade pip
          PYTHON=python make wheel
      - name: Smoke packaged dashboard assets
        working-directory: AgentLens
        run: |
          unzip -l dist/agentlens-0.1.0-py3-none-any.whl | grep 'agentlens/web_assets/'
          unzip -l dist/agentlens-0.1.0-py3-none-any.whl | grep 'agentlens/demo_data/'

name: 01-trivial-typo
description: |
  3 SMALL-bucket tasks across 3 disjoint files ظ¤ comment typo cleanup pass.
  Tests P5 SMALL bucket per task (ظëج8 tool calls each), LOW risk batch
  verification at Phase 2 Step 0, and that the orchestrator runs end-to-end
  on a deliberately low-complexity multi-task plan. Critical baseline: if a
  3-typo plan completes via orchestrator, the multi-agent overhead is
  proven non-prohibitive.

bootstrap: |
  mkdir -p src
  cat > src/main.py <<'PY'
  def greet(name):
      # Retrun a friendly greeting.
      return f"Hello, {name}"
  PY
  cat > src/util.py <<'PY'
  def measure(s):
      # Recieve a string and return its length.
      return len(s)
  PY
  cat > src/event.py <<'PY'
  def fire(name):
      # Trigger an event that occured.
      return name
  PY
  printf 'test:\n\tpython -c "from src.main import greet; from src.util import measure; from src.event import fire" || true\n' > Makefile

plan: |
  ### Task 0: Fix `Retrun` typo in src/main.py comment

  **Files:**
  - src/main.py

  The comment `# Retrun a friendly greeting.` has a typo. Replace `Retrun` with `Return`.
  No other lines should change.

  ### Task 1: Fix `Recieve` typo in src/util.py comment

  **Files:**
  - src/util.py

  The comment `# Recieve a string and return its length.` has a typo. Replace `Recieve` with `Receive`.
  No other lines should change.

  ### Task 2: Fix `occured` typo in src/event.py comment

  **Files:**
  - src/event.py

  The comment `# Trigger an event that occured.` has a typo. Replace `occured` with `occurred`.
  No other lines should change.

spec: |
  # Spec: comment typo cleanup pass

  Three independent comment typos across three modules. Each correction must be exact
  and isolated ظ¤ no whitespace changes, no reformatting, no extra lines.

  - src/main.py: `Retrun` ظْ `Return`
  - src/util.py: `Recieve` ظْ `Receive`
  - src/event.py: `occured` ظْ `occurred`

  Each module's public function (`greet`, `measure`, `fire`) keeps its existing signature
  and behavior. The fix is confined to comment text only.

invocation: ""

expected:
  task_count: 3
  expected_files_changed:
    - src/main.py
    - src/util.py
    - src/event.py
  commit_count_min: 3
  commit_count_max: 9
  test_after: |
    grep -q '# Return a friendly greeting.' src/main.py && \
    grep -q '# Receive a string and return its length.' src/util.py && \
    grep -q '# Trigger an event that occurred.' src/event.py && echo PASS || echo FAIL
  notes: |
    All 3 tasks should land in SMALL bucket per v2.5.1 effort-scaling
    (1 file, ~50 LOC spec, 0 new declarations, LOW risk ظْ SMALL).
    All 3 LOW risk ظْ no per-task Verifier; single batch verifier sweep at
    Phase 2 Step 0. Per design, batch pre-filter should classify these as
    code-modifying (files_test=[] but files include .py, not all .md) ظْ
    regular test run via Makefile.
    SPEC_SCORE >= 0.9 expected per task; QUALITY_SCORE >= 0.85.
    Plan Reviewer (Phase 0 Step 6.5) should PASS (no missing Files,
    no contract drift, mechanical-only audit).

cost_budget:
  wallclock_minutes: 15
  tokens: 300000

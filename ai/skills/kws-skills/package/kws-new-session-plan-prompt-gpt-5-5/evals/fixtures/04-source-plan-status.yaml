name: source-plan-status
description: Generated prompt may update source-of-truth plan checkboxes outside the integration worktree.
user_request: >-
  Generate a prompt for /tmp/archive-fixtures/plans/checkbox-plan.md and keep
  plan checkboxes updated.
available_paths:
  workspace: /tmp/archive-fixtures/repo
  plan: /tmp/archive-fixtures/plans/checkbox-plan.md
expected:
  must_include:
    - inspect plan document tracked/untracked/dirty status before progress edits
    - record plan doc commit handling in task contract, checkpoint, and final summary
    - do not stage or commit untracked or unrelated original-workspace plan docs by inference
  must_not_include:
    - unconditional instruction to commit the original plan document
    - instruction to ignore unrelated original workspace changes
regression_risk: generated prompt mutates source-of-truth docs unsafely

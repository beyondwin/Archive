name: continuation-session
description: Continuation prompt must preserve an existing orchestrator session ledger.
user_request: >-
  Generate a continuation prompt for /tmp/archive-fixtures/plans/plan.md.
available_paths:
  workspace: /tmp/archive-fixtures/repo
  plan: /tmp/archive-fixtures/plans/plan.md
  session_json: /tmp/archive-fixtures/repo/.codex-orchestrator/session.json
expected:
  must_include:
    - instruction to read .codex-orchestrator/session.json before resuming
    - current task/phase recovery from the ledger
    - continuation stop rules
    - raw-output preservation guidance
    - session-owned cleanup scoped to ledger evidence
  must_not_include:
    - instruction to restart from Task 0 when ledger exists
    - broad process cleanup such as killall node or pkill playwright
regression_risk: fresh prompt accidentally discards restart-critical state

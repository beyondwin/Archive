name: prompt-only-plan
description: Prompt-only request with a valid implementation plan and no optional docs.
user_request: >-
  Use the skill to generate a prompt only for
  /tmp/archive-fixtures/plans/implementation.md.
available_paths:
  workspace: /tmp/archive-fixtures/repo
  plan: /tmp/archive-fixtures/plans/implementation.md
  optional_docs: []
expected:
  output_shape:
    - exactly one fenced text block
    - no lead-in sentence
  must_include:
    - absolute workspace path
    - absolute implementation plan path
    - repo-local instruction check
    - task-by-task execution contract
    - gpt-5.5 high routing
    - conservative Spark evidence packing
    - pre-send checklist satisfied
  must_not_include:
    - placeholder optional document bullets
    - "{{OPTIONAL_DOCUMENT_BULLETS}}"
    - "{{OPTIONAL_SPARK_SCOUT_BULLETS}}"
    - implementation started in the current session
regression_risk: output shape and placeholder leakage
